<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>FontConv — Variable Font Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Converteer fonts tussen WOFF2, TTF, OTF en WOFF. Variable font-data blijft intact.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Flits Design System tokens ── */
    :root {
      --brand-yellow:      #FFF301;
      --brand-yellow-soft: rgba(255, 243, 1, 0.15);

      --bg-0: #070707;
      --bg-1: #0F0F10;
      --bg-2: #161616;
      --bg-3: #19191A;
      --bg-4: #1F1F1F;

      --border-subtle: #1D1E1F;
      --border-strong: #626465;

      --fg-1:        #F1E7E7;
      --fg-2:        #919193;
      --fg-3:        #656565;
      --fg-disabled: #3A3A3B;

      --green-500:  #46A557;
      --red-500:    #E54D2E;
      --orange-500: #FFB223;

      --r-xs:   2px;
      --r-sm:   4px;
      --r-md:   8px;
      --r-lg:   10px;
      --r-pill: 100px;

      --font-sans: 'Syne', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, 'Cascadia Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg-0);
      color: var(--fg-1);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.3;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 20px;
    }

    .bolt-mark {
      width: 26px;
      height: 26px;
      background: var(--brand-yellow-soft);
      border: 1px solid rgba(255, 243, 1, 0.12);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg-1);
      letter-spacing: -0.025em;
    }

    .header-sep { color: var(--fg-3); font-size: 13px; user-select: none; }

    .header-by { font-size: 12px; color: var(--fg-3); }
    .header-by a { color: var(--fg-2); text-decoration: none; transition: color 120ms; }
    .header-by a:hover { color: var(--fg-1); }

    /* ── Card ── */
    .card {
      background: var(--bg-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      overflow: hidden;
    }

    /* ── Drop zone ── */
    .dropzone {
      position: relative;
      padding: 20px;
      cursor: pointer;
      transition: background 120ms;
    }

    .dropzone:hover,
    .dropzone.drag-over { background: rgba(255,255,255,0.015); }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .drop-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 32px 16px;
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--r-md);
      transition: border-color 120ms;
      text-align: center;
      pointer-events: none;
    }

    .dropzone:hover .drop-inner,
    .dropzone.drag-over .drop-inner { border-color: var(--fg-2); }

    .drop-icon { color: var(--fg-3); margin-bottom: 4px; }
    .drop-title { font-size: 14px; font-weight: 500; color: var(--fg-2); }
    .drop-subtitle { font-size: 12px; color: var(--fg-3); }

    .formats-hint { display: flex; gap: 4px; margin-top: 12px; }

    .fmt-hint-chip {
      height: 20px; padding: 0 7px;
      border-radius: var(--r-sm);
      background: var(--bg-3); color: var(--fg-3);
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0; display: inline-flex; align-items: center;
    }

    /* ── Batch bar ── */
    .batch-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .batch-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .batch-btns { display: flex; gap: 5px; flex: 1; }

    .batch-btn {
      flex: 1;
      height: 28px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-2);
      color: var(--fg-2);
      border-radius: var(--r-md);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      transition: background 120ms, color 120ms, border-color 120ms;
    }

    .batch-btn:hover:not(:disabled) {
      background: var(--bg-3); color: var(--fg-1); border-color: var(--border-strong);
    }
    .batch-btn:active:not(:disabled) { opacity: 0.75; }
    .batch-btn:disabled {
      color: var(--fg-disabled); border-color: var(--border-subtle); cursor: not-allowed;
    }

    /* ── File rows ── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border-top: 1px solid var(--border-subtle);
      transition: background 120ms;
      min-width: 0;
    }

    .file-row:hover { background: rgba(255,255,255,0.01); }

    .file-row.is-loading { opacity: 0.6; pointer-events: none; }

    .row-icon { color: var(--fg-3); flex-shrink: 0; display: flex; }

    .row-name {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--fg-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .row-badge {
      height: 18px; padding: 0 6px;
      border-radius: var(--r-xs);
      background: var(--bg-3); color: var(--fg-2);
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0; display: inline-flex; align-items: center; flex-shrink: 0;
    }

    .row-fmts { display: flex; gap: 3px; flex-shrink: 0; }

    .row-fmt-btn {
      height: 24px;
      padding: 0 7px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--fg-3);
      border-radius: var(--r-sm);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0;
      transition: background 120ms, color 120ms, border-color 120ms;
      white-space: nowrap;
    }

    .row-fmt-btn:hover:not(:disabled) {
      background: var(--bg-3); color: var(--fg-1); border-color: var(--border-strong);
    }
    .row-fmt-btn:active:not(:disabled) { opacity: 0.75; }
    .row-fmt-btn:disabled {
      background: var(--bg-3); color: var(--fg-disabled);
      border-color: transparent; cursor: not-allowed;
    }

    .row-remove {
      background: none; border: none;
      color: var(--fg-3); cursor: pointer;
      padding: 3px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: color 120ms;
    }
    .row-remove:hover { color: var(--fg-1); }

    /* ── Add more ── */
    .add-more-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border-top: 1px solid var(--border-subtle);
      cursor: pointer;
      position: relative;
      transition: background 120ms;
    }

    .add-more-row:hover { background: rgba(255,255,255,0.015); }

    .add-more-row input {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }

    .add-more-label {
      font-size: 12px; color: var(--fg-3);
      display: flex; align-items: center; gap: 6px;
      pointer-events: none;
    }

    /* ── Privacy row ── */
    .privacy-row {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .privacy-text { font-size: 11px; color: var(--fg-3); }

    /* ── Status card ── */
    .status-card {
      background: var(--bg-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 11px 14px;
      display: flex; align-items: center; gap: 10px;
    }

    .status-card.is-success { border-color: rgba(70, 165, 87, 0.25); }
    .status-card.is-error   { border-color: rgba(229, 77, 46, 0.25); }

    .status-icon { display: flex; align-items: center; flex-shrink: 0; }
    .status-text { font-size: 13px; color: var(--fg-2); flex: 1; }
    .status-card.is-success .status-text { color: var(--green-500); }
    .status-card.is-error   .status-text { color: var(--red-500); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 1.5px solid var(--border-strong);
      border-top-color: var(--fg-2);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* ── Footer ── */
    .footer {
      text-align: center; font-size: 11px; color: var(--fg-3); margin-top: 8px;
    }
    .footer a { color: var(--fg-2); text-decoration: none; transition: color 120ms; }
    .footer a:hover { color: var(--fg-1); }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">

      <!-- Header -->
      <header class="header">
        <div class="bolt-mark">
          <svg width="12" height="15" viewBox="0 0 12 15" fill="none">
            <path d="M7 1L1 8.5H6.5L5.5 14L11 6.5H5.5L7 1Z" fill="#FFF301"/>
          </svg>
        </div>
        <span class="wordmark">FontConv</span>
        <span class="header-sep">·</span>
        <span class="header-by"><a href="https://flitsdigital.nl" target="_blank" rel="noopener">Flits Digital</a></span>
      </header>

      <!-- Empty state: drop zone -->
      <div class="card" id="drop-card">
        <div class="dropzone" id="dropzone">
          <input type="file" id="file-input" accept=".ttf,.otf,.woff,.woff2" multiple tabindex="-1">
          <div class="drop-inner">
            <div class="drop-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M12 15V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M8.5 7.5L12 4L15.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="drop-title">Sleep fonts hier naartoe</p>
            <p class="drop-subtitle">of klik om te kiezen — meerdere tegelijk mogelijk</p>
            <div class="formats-hint">
              <span class="fmt-hint-chip">TTF</span>
              <span class="fmt-hint-chip">OTF</span>
              <span class="fmt-hint-chip">WOFF2</span>
              <span class="fmt-hint-chip">WOFF</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Loaded state: file list -->
      <div class="card" id="list-card" hidden>

        <!-- Batch convert bar -->
        <div class="batch-bar">
          <span class="batch-label">Alles naar</span>
          <div class="batch-btns" id="batch-btns">
            <button class="batch-btn" data-format="ttf">TTF</button>
            <button class="batch-btn" data-format="otf">OTF</button>
            <button class="batch-btn" data-format="woff2">WOFF2</button>
            <button class="batch-btn" data-format="woff">WOFF</button>
          </div>
        </div>

        <!-- File rows (rendered by JS) -->
        <div id="file-list"></div>

        <!-- Add more -->
        <div class="add-more-row">
          <input type="file" id="add-input" accept=".ttf,.otf,.woff,.woff2" multiple tabindex="-1">
          <span class="add-more-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Meer fonts toevoegen
          </span>
        </div>

        <!-- Privacy -->
        <div class="privacy-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#656565" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <span class="privacy-text">Verwerking op eigen server · Fonts worden niet opgeslagen</span>
        </div>

      </div>

      <!-- Status -->
      <div class="status-card" id="status-card" hidden>
        <span class="status-icon" id="status-icon"></span>
        <span class="status-text" id="status-text"></span>
      </div>

      <footer class="footer">
        Variable font-data (fvar, gvar) blijft intact · Max 50 MB per bestand
      </footer>

    </div>
  </main>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    const ALLOWED = ['ttf', 'otf', 'woff', 'woff2'];
    let files = []; // {id, file, name, ext}
    let nextId = 0;
    let busy = false;

    // ── DOM ───────────────────────────────────────────────────────────────────
    const dropCard   = document.getElementById('drop-card');
    const dropzone   = document.getElementById('dropzone');
    const fileInput  = document.getElementById('file-input');
    const listCard   = document.getElementById('list-card');
    const fileList   = document.getElementById('file-list');
    const batchBtns  = document.getElementById('batch-btns');
    const addInput   = document.getElementById('add-input');
    const statusCard = document.getElementById('status-card');
    const statusIcon = document.getElementById('status-icon');
    const statusText = document.getElementById('status-text');

    // ── Helpers ───────────────────────────────────────────────────────────────
    const getExt = name => name.split('.').pop().toLowerCase();

    function showStatus(type, msg) {
      statusCard.hidden = false;
      statusCard.className = 'status-card' + (type !== 'loading' ? ' is-' + type : '');
      statusText.textContent = msg;
      if (type === 'loading') {
        statusIcon.innerHTML = '<div class="spinner"></div>';
      } else if (type === 'success') {
        statusIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#46A557" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      } else {
        statusIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#E54D2E" stroke-width="1.5"/><path d="M12 8v4m0 4h.01" stroke="#E54D2E" stroke-width="1.5" stroke-linecap="round"/></svg>';
      }
    }

    function hideStatus() { statusCard.hidden = true; }

    // ── File management ───────────────────────────────────────────────────────
    function addFiles(fileList_) {
      let added = 0;
      for (const f of fileList_) {
        const ext = getExt(f.name);
        if (!ALLOWED.includes(ext)) continue;
        if (files.find(item => item.name === f.name)) continue; // dedup by name
        files.push({ id: nextId++, file: f, name: f.name, ext });
        added++;
      }
      if (added) { render(); hideStatus(); }
    }

    function removeFile(id) {
      files = files.filter(f => f.id !== id);
      if (files.length === 0) {
        listCard.hidden = true;
        dropCard.hidden = false;
        hideStatus();
      } else {
        render();
      }
    }

    // ── Render file list ──────────────────────────────────────────────────────
    function render() {
      dropCard.hidden = files.length > 0;
      listCard.hidden = files.length === 0;

      fileList.innerHTML = files.map(item => `
        <div class="file-row" data-id="${item.id}" id="row-${item.id}">
          <span class="row-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9L13 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <polyline points="13 2 13 9 20 9" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="row-name" title="${item.name}">${item.name}</span>
          <span class="row-badge">${item.ext.toUpperCase()}</span>
          <div class="row-fmts">
            ${ALLOWED.map(fmt => `
              <button class="row-fmt-btn" data-fmt="${fmt}" data-id="${item.id}"
                      ${fmt === item.ext ? 'disabled' : ''}>${fmt.toUpperCase()}</button>
            `).join('')}
          </div>
          <button class="row-remove" data-id="${item.id}" title="Verwijder">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    // ── Conversion ────────────────────────────────────────────────────────────
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function convertOne(id, targetFmt) {
      if (busy) return;
      const item = files.find(f => f.id === id);
      if (!item) return;

      const row = document.getElementById(`row-${id}`);
      row?.classList.add('is-loading');
      showStatus('loading', `Converteren naar ${targetFmt.toUpperCase()}…`);

      const body = new FormData();
      body.append('font', item.file);
      body.append('format', targetFmt);

      try {
        const res = await fetch('/api/convert', { method: 'POST', body });
        if (!res.ok) {
          const raw = await res.text();
          let msg = `HTTP ${res.status}`;
          try { msg = JSON.parse(raw).error || msg; } catch (_) {}
          console.error('[FontConv] error:', raw);
          throw new Error(msg);
        }
        const blob    = await res.blob();
        const outName = item.name.replace(/\.[^.]+$/, '') + '.' + targetFmt;
        triggerDownload(blob, outName);
        showStatus('success', `Gedownload als ${outName}`);
      } catch (err) {
        showStatus('error', err.message || 'Conversie mislukt.');
      } finally {
        row?.classList.remove('is-loading');
      }
    }

    async function convertAll(targetFmt) {
      if (busy || files.length === 0) return;
      busy = true;

      // Disable all interactive elements
      document.querySelectorAll('.batch-btn, .row-fmt-btn, .row-remove').forEach(el => el.disabled = true);
      showStatus('loading', `${files.length} font${files.length > 1 ? 's' : ''} converteren naar ${targetFmt.toUpperCase()}…`);

      const body = new FormData();
      files.forEach(item => body.append('font', item.file));
      body.append('format', targetFmt);

      console.group(`[FontConv] batch → ${targetFmt.toUpperCase()}`);
      console.log('files:', files.map(f => f.name));

      try {
        const res = await fetch('/api/convert', { method: 'POST', body });
        console.log('status:', res.status, res.headers.get('content-type'));

        if (!res.ok) {
          const raw = await res.text();
          let msg = `HTTP ${res.status}`;
          try {
            const data = JSON.parse(raw);
            msg = data.error || msg;
            if (data.traceback) console.error('traceback:\n' + data.traceback);
            if (data.imports)   console.table(data.imports);
          } catch (_) {}
          console.error('response:', raw);
          throw new Error(msg);
        }

        const blob = await res.blob();
        const ct   = res.headers.get('content-type') || '';
        const ext  = ct.includes('zip') ? 'zip' : targetFmt;
        const name = files.length === 1
          ? files[0].name.replace(/\.[^.]+$/, '') + '.' + targetFmt
          : `fonts-${targetFmt}.zip`;

        triggerDownload(blob, name);
        const count = files.length;
        showStatus('success', count === 1
          ? `Gedownload als ${name}`
          : `${count} fonts gedownload als ${name}`);

        console.log('✓ downloaded:', name, blob.size, 'bytes');

      } catch (err) {
        console.error('[FontConv] fout:', err);
        showStatus('error', err.message || 'Conversie mislukt.');
      } finally {
        console.groupEnd();
        busy = false;
        render(); // re-render to restore buttons
      }
    }

    // ── Events ────────────────────────────────────────────────────────────────

    // Initial drop zone
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });
    dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', e => { if (!dropzone.contains(e.relatedTarget)) dropzone.classList.remove('drag-over'); });
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('drag-over');
      addFiles(e.dataTransfer.files);
    });

    // Add more
    addInput.addEventListener('change', () => { addFiles(addInput.files); addInput.value = ''; });

    // Page-level drag-drop (when list is visible)
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => { e.preventDefault(); addFiles(e.dataTransfer.files); });

    // Batch buttons
    batchBtns.addEventListener('click', e => {
      const btn = e.target.closest('.batch-btn');
      if (btn && !btn.disabled) convertAll(btn.dataset.format);
    });

    // Per-row: individual convert + remove
    fileList.addEventListener('click', e => {
      const fmtBtn = e.target.closest('.row-fmt-btn');
      if (fmtBtn && !fmtBtn.disabled) {
        convertOne(Number(fmtBtn.dataset.id), fmtBtn.dataset.fmt);
        return;
      }
      const remBtn = e.target.closest('.row-remove');
      if (remBtn && !remBtn.disabled) {
        removeFile(Number(remBtn.dataset.id));
      }
    });

    // Health check on load (for debugging)
    fetch('/api/health')
      .then(r => r.json())
      .then(d => { console.group('[FontConv] /api/health'); console.table(d); console.groupEnd(); })
      .catch(() => {});
  </script>
</body>
